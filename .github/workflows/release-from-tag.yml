name: Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from changelog
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["TAG_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")

          pattern = re.compile(
              rf"^## \[{re.escape(version)}\] - .*?(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          if not match:
              print(f"No changelog entry found for tag {tag}", file=sys.stderr)
              sys.exit(1)

          body = match.group(0).strip() + "\n"
          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write("release_name=Release " + tag + "\n")
              fh.write("release_body<<EOF\n")
              fh.write(body)
              fh.write("EOF\n")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.changelog.outputs.release_name }}
          body: ${{ steps.changelog.outputs.release_body }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
